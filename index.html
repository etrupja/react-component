<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="React Component Showcase" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>React Component Showcase</title>

    <!-- OpenGraph / Twitter -->
    <meta property="og:title" content="React Component Showcase" />
    <meta property="og:description" content="A collection of interactive React components." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://react-component.com/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="React Component Showcase" />
    <meta name="twitter:description" content="A collection of interactive React components." />

    <!-- Cross-promo attribution -->
    <meta name="x-built-by" content="ReSlug, reslug.com" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
